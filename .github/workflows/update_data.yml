name: 📊 Auto-Update FII & DII Data

on:
  schedule:
    # 12:30 UTC = 6:00 PM IST — NSE publishes data after market close (3:30 PM IST)
    - cron: '30 12 * * 1-5'   # Monday–Friday only
  workflow_dispatch:            # Allow manual trigger from GitHub Actions tab

jobs:
  update-fii-dii-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write           # needed to commit data files back to repo

    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4

      - name: 🟢 Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 📡 Fetch NSE FII/DII data
        id: fetch
        run: npm run fetch
        # Script exits with code 1 on critical failure — this step will fail
        # and prevent corrupt data from being committed.

      - name: 💾 Commit updated data
        if: steps.fetch.outcome == 'success'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest.json data/history.json
          if git diff --staged --quiet; then
            echo "ℹ️ No new data today (market likely closed)."
          else
            git commit -m "data: auto-update $(date +'%d-%b-%Y %H:%M UTC')"
            git push
          fi
